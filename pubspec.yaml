name: kjv_bible_lite
description: "A new Flutter bible project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.1
  scrollable_positioned_list: ^0.3.8
  shared_preferences: ^2.5.4
  share_plus: ^12.0.1
  path_provider: ^2.1.5
  screenshot: ^3.0.0
  path: ^1.9.1
  speech_to_text: ^7.3.0
  permission_handler: ^12.0.1
  wakelock_plus: ^1.4.0
  flutter_local_notifications: ^17.1.3
  timezone: 0.9.0
  flutter_timezone: ^5.0.1
  flutter_tts: ^4.2.5
  just_audio: ^0.10.5
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.2

flutter:
  uses-material-design: true
  assets:
    - assets/kjv.json
    - assets/asv.json
    - assets/app_icon.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/app_icon.png"
  min_sdk_android: 21
